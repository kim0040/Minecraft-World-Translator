<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Minecraft World Translator UI</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="ambient ambient-a"></div>
    <div class="ambient ambient-b"></div>
    <div class="grid-mask"></div>

    <div class="page">
      <header class="topbar">
        <div class="brand">
          <p class="kicker" data-i18n="brandKicker"></p>
          <h1 class="brand-title" data-i18n="brandTitle"></h1>
          <p class="brand-copy" data-i18n="brandCopy"></p>
        </div>

        <div class="top-controls">
          <div class="lang-switch" aria-label="language">
            <button type="button" class="seg-btn" data-lang-switch="ko">KO</button>
            <button type="button" class="seg-btn" data-lang-switch="en">EN</button>
            <button type="button" class="seg-btn" data-lang-switch="ja">日本語</button>
          </div>
          <button type="button" class="theme-btn" id="themeToggle"></button>
        </div>
      </header>

      <section class="hero card">
        <div class="hero-copy">
          <p class="kicker" data-i18n="heroKicker"></p>
          <h2 data-i18n="heroTitle"></h2>
          <p class="hero-text" data-i18n="heroText"></p>
        </div>

        <div class="hero-panels">
          <article class="mini-panel">
            <span class="mini-index">01</span>
            <h3 data-i18n="heroPanelOneTitle"></h3>
            <p data-i18n="heroPanelOneBody"></p>
          </article>
          <article class="mini-panel">
            <span class="mini-index">02</span>
            <h3 data-i18n="heroPanelTwoTitle"></h3>
            <p data-i18n="heroPanelTwoBody"></p>
          </article>
          <article class="mini-panel">
            <span class="mini-index">03</span>
            <h3 data-i18n="heroPanelThreeTitle"></h3>
            <p data-i18n="heroPanelThreeBody"></p>
          </article>
        </div>
      </section>

      <main class="workspace">
        <div class="form-column">
          <section class="card section-card">
            <div class="section-head">
              <div>
                <p class="kicker" data-i18n="connectionKicker"></p>
                <h2 data-i18n="connectionTitle"></h2>
                <p class="section-copy" data-i18n="connectionCopy"></p>
              </div>
              <span class="tag" data-i18n="connectionTag"></span>
            </div>

            <div class="provider-picker" id="providerPicker"></div>
            <div id="geminiWarning" class="field-help hidden" style="color:var(--orange); font-weight:700; margin-bottom:18px;" data-i18n="geminiWarning"></div>

            <div id="customProviderSettings" class="field-grid one hidden" style="margin-bottom:18px;">
              <label class="field">
                <span class="field-label" data-i18n="fieldCustomFormat"></span>
                <select id="customProviderFormat">
                  <option value="custom_openai" data-i18n="optCustomOpenAI"></option>
                  <option value="custom_anthropic" data-i18n="optCustomAnthropic"></option>
                </select>
                <span class="field-help" data-i18n="helpCustomFormat"></span>
              </label>
            </div>

            <div class="field-grid two">
              <label class="field">
                <span class="field-label" data-i18n="fieldWorldDir"></span>
                <input id="worldDir" type="text" />
                <span class="field-help" data-i18n="helpWorldDir"></span>
              </label>
              <label class="field">
                <span class="field-label" data-i18n="fieldReportPath"></span>
                <input id="reportPath" type="text" />
                <span class="field-help" data-i18n="helpReportPath"></span>
              </label>
            </div>

            <div class="field-grid two">
              <label class="field">
                <span class="field-label" data-i18n="fieldTranslatePy"></span>
                <input id="translatePyPath" type="text" />
                <span class="field-help" data-i18n="helpTranslatePy"></span>
              </label>
              <label class="field checkbox-field">
                <span class="field-label" data-i18n="fieldInheritTranslatePy"></span>
                <span class="toggle-line">
                  <input id="inheritTranslatePy" type="checkbox" checked />
                  <span data-i18n="helpInheritTranslatePy"></span>
                </span>
              </label>
            </div>

            <div class="field-grid four">
              <label class="field">
                <span class="field-label" data-i18n="fieldApiKey"></span>
                <input id="apiKey" type="password" autocomplete="off" />
                <span class="field-help" data-i18n="helpApiKey"></span>
              </label>
              <label class="field">
                <span class="field-label" data-i18n="fieldBaseUrl"></span>
                <input id="baseUrl" type="text" />
                <span class="field-help" id="baseUrlHelp"></span>
              </label>
              <label class="field">
                <span class="field-label" data-i18n="fieldModel"></span>
                <input id="model" type="text" list="modelSuggestions" />
                <datalist id="modelSuggestions"></datalist>
                <span class="field-help" data-i18n="helpModel"></span>
              </label>
              <label class="field">
                <span class="field-label" data-i18n="fieldTimeout"></span>
                <input id="requestTimeout" type="number" min="10" />
                <span class="field-help" data-i18n="helpTimeout"></span>
              </label>
            </div>

            <div class="inline-tools">
              <button type="button" class="secondary-btn" id="loadModelsButton" data-i18n="actionLoadModels"></button>
              <span class="inline-status" id="modelCatalogStatus"></span>
            </div>

            <div class="model-catalog" id="modelCatalog"></div>
          </section>

          <section class="card section-card">
            <div class="section-head">
              <div>
                <p class="kicker" data-i18n="promptKicker"></p>
                <h2 data-i18n="promptTitle"></h2>
                <p class="section-copy" data-i18n="promptCopy"></p>
              </div>
            </div>

            <div class="field-grid three">
              <label class="field">
                <span class="field-label" data-i18n="fieldTargetLanguage"></span>
                <select id="targetLanguagePreset"></select>
                <span class="field-help" data-i18n="helpTargetLanguage"></span>
              </label>
              <label class="field hidden" id="customLanguageField">
                <span class="field-label" data-i18n="fieldCustomLanguage"></span>
                <input id="customLanguage" type="text" />
                <span class="field-help" data-i18n="helpCustomLanguage"></span>
              </label>
              <label class="field">
                <span class="field-label" data-i18n="fieldStylePreset"></span>
                <select id="stylePreset"></select>
                <span class="field-help" id="stylePresetHelp"></span>
              </label>
            </div>

            <div class="field-grid two">
              <label class="field">
                <span class="field-label" data-i18n="fieldStyleBrief"></span>
                <textarea id="styleBrief" rows="4"></textarea>
                <span class="field-help" data-i18n="helpStyleBrief"></span>
              </label>
              <div class="assist-box">
                <div>
                  <span class="field-label" data-i18n="assistTitle"></span>
                  <p class="field-help" data-i18n="assistBody"></p>
                </div>
                <button type="button" class="secondary-btn" id="improveStyleButton" data-i18n="actionImproveStyle"></button>
                <span class="inline-status" id="styleAssistStatus"></span>
              </div>
            </div>

            <div class="field-grid one">
              <label class="field">
                <span class="field-label" data-i18n="fieldStylePrompt"></span>
                <textarea id="stylePrompt" rows="6"></textarea>
                <span class="field-help" data-i18n="helpStylePrompt"></span>
              </label>
            </div>

            <details class="detail-box">
              <summary data-i18n="customPromptToggle"></summary>
              <label class="field">
                <span class="field-label" data-i18n="fieldCustomPrompt"></span>
                <textarea id="customSystemPrompt" rows="6"></textarea>
                <span class="field-help" data-i18n="helpCustomPrompt"></span>
              </label>
            </details>
          </section>

          <section class="card section-card">
            <div class="section-head">
              <div>
                <p class="kicker" data-i18n="scopeKicker"></p>
                <h2 data-i18n="scopeTitle"></h2>
                <p class="section-copy" data-i18n="scopeCopy"></p>
              </div>
            </div>

            <div class="preset-row">
              <button type="button" class="secondary-btn" data-scope-preset="recommended" data-i18n="scopePresetRecommended"></button>
              <button type="button" class="secondary-btn" data-scope-preset="story" data-i18n="scopePresetStory"></button>
              <button type="button" class="secondary-btn" data-scope-preset="all" data-i18n="scopePresetAll"></button>
            </div>

            <div class="scope-grid">
              <article class="scope-card">
                <h3 data-i18n="scopeGroupCore"></h3>
                <label class="toggle-chip"><input id="translateBooks" type="checkbox" checked /><span data-i18n="scopeBooks"></span></label>
                <label class="toggle-chip"><input id="translateSigns" type="checkbox" checked /><span data-i18n="scopeSigns"></span></label>
                <label class="toggle-chip"><input id="translateTitles" type="checkbox" checked /><span data-i18n="scopeTitles"></span></label>
                <label class="toggle-chip"><input id="translateFilteredTitles" type="checkbox" checked /><span data-i18n="scopeFilteredTitles"></span></label>
              </article>
              <article class="scope-card">
                <h3 data-i18n="scopeGroupItems"></h3>
                <label class="toggle-chip"><input id="translateCustomNames" type="checkbox" checked /><span data-i18n="scopeCustomNames"></span></label>
                <label class="toggle-chip"><input id="translateItemNames" type="checkbox" checked /><span data-i18n="scopeItemNames"></span></label>
                <label class="toggle-chip"><input id="translateLore" type="checkbox" checked /><span data-i18n="scopeLore"></span></label>
              </article>
              <article class="scope-card">
                <h3 data-i18n="scopeGroupScripted"></h3>
                <label class="toggle-chip"><input id="translateCommandOutput" type="checkbox" checked /><span data-i18n="scopeCommandOutput"></span></label>
                <label class="toggle-chip"><input id="skipCommandLikeText" type="checkbox" checked /><span data-i18n="scopeSkipCommands"></span></label>
              </article>
            </div>
          </section>

          <section class="card section-card">
            <div class="section-head">
              <div>
                <p class="kicker" data-i18n="resourceKicker"></p>
                <h2 data-i18n="resourceTitle"></h2>
                <p class="section-copy" data-i18n="resourceCopy"></p>
              </div>
              <label class="toggle-chip hero-toggle">
                <input id="resourceEnabled" type="checkbox" />
                <span data-i18n="fieldResourceEnabled"></span>
              </label>
            </div>

            <div id="resourcePanel" class="resource-panel">
              <div class="field-grid three">
                <label class="field">
                  <span class="field-label" data-i18n="fieldZipPaths"></span>
                  <textarea id="zipPaths" rows="4"></textarea>
                  <span class="field-help" data-i18n="helpZipPaths"></span>
                </label>
                <label class="field">
                  <span class="field-label" data-i18n="fieldSourceLangFiles"></span>
                  <textarea id="sourceLangFiles" rows="4"></textarea>
                  <span class="field-help" data-i18n="helpSourceLangFiles"></span>
                </label>
                <label class="field">
                  <span class="field-label" data-i18n="fieldTargetLangFile"></span>
                  <input id="targetLangFile" type="text" />
                  <span class="field-help" data-i18n="helpTargetLangFile"></span>
                </label>
              </div>

              <label class="toggle-chip inline-chip">
                <input id="skipIfTargetExists" type="checkbox" />
                <span data-i18n="fieldSkipExistingLang"></span>
              </label>
            </div>
          </section>

          <details class="card section-card advanced-details">
            <summary>
              <div>
                <p class="kicker" data-i18n="advancedKicker"></p>
                <h2 data-i18n="advancedTitle"></h2>
              </div>
            </summary>

            <div class="advanced-box">
              <h3 class="section-subhead" data-i18n="advGroupPerf"></h3>
              <div class="field-grid four">
                <label class="field">
                  <span class="field-label" data-i18n="fieldBatchSize"></span>
                  <input id="batchSize" type="number" min="1" />
                  <span class="field-help" data-i18n="helpBatchSize"></span>
                </label>
                <label class="field">
                  <span class="field-label" data-i18n="fieldTemperature"></span>
                  <input id="temperature" type="number" min="0" max="2" step="0.1" />
                  <span class="field-help" data-i18n="helpTemperature"></span>
                </label>
                <label class="field">
                  <span class="field-label" data-i18n="fieldRpmLimit"></span>
                  <input id="rpmLimit" type="number" min="1" placeholder="-" />
                  <span class="field-help" data-i18n="helpRpmLimit"></span>
                </label>
                <label class="field">
                  <span class="field-label" data-i18n="fieldTpmLimit"></span>
                  <input id="tpmLimit" type="number" min="1" placeholder="-" />
                  <span class="field-help" data-i18n="helpTpmLimit"></span>
                </label>
              </div>
              
              <div class="field-grid two">
                <label class="field">
                  <span class="field-label" data-i18n="fieldBatchRetries"></span>
                  <input id="maxBatchRetries" type="number" min="1" />
                  <span class="field-help" data-i18n="helpBatchRetries"></span>
                </label>
                <label class="field">
                  <span class="field-label" data-i18n="fieldWriteRetries"></span>
                  <input id="maxFileWriteRetries" type="number" min="1" />
                  <span class="field-help" data-i18n="helpWriteRetries"></span>
                </label>
              </div>
            </div>
            <div class="advanced-box">
              <h3 class="section-subhead" data-i18n="advGroupRecover"></h3>
              <div class="field-grid three">
                <label class="field checkbox-field">
                  <span class="field-label" data-i18n="fieldCheckpointEnabled"></span>
                  <span class="toggle-line">
                    <input id="checkpointEnabled" type="checkbox" checked />
                    <span data-i18n="helpCheckpointEnabled"></span>
                  </span>
                </label>
                <label class="field checkbox-field">
                  <span class="field-label" data-i18n="fieldContinueOnError"></span>
                  <span class="toggle-line">
                    <input id="continueOnFileError" type="checkbox" checked />
                    <span data-i18n="helpContinueOnError"></span>
                  </span>
                </label>
                <label class="field">
                  <span class="field-label" data-i18n="fieldCheckpointPath"></span>
                  <input id="checkpointPath" type="text" />
                  <span class="field-help" data-i18n="helpCheckpointPath"></span>
                </label>
              </div>
              
              <div class="field-grid two">
                <label class="field checkbox-field">
                  <span class="field-label" data-i18n="fieldBackup"></span>
                  <span class="toggle-line">
                    <input id="backup" type="checkbox" checked />
                    <span data-i18n="helpBackup"></span>
                  </span>
                </label>
                <label class="field">
                  <span class="field-label" data-i18n="fieldBackupSuffix"></span>
                  <input id="backupSuffix" type="text" />
                  <span class="field-help" data-i18n="helpBackupSuffix"></span>
                </label>
              </div>
            </div>
            <div class="advanced-box">
              <h3 class="section-subhead" data-i18n="advGroupDebug"></h3>
              <div class="field-grid one">
                <label class="field checkbox-field">
                  <span class="field-label" data-i18n="fieldDryRun"></span>
                  <span class="toggle-line">
                    <input id="dryRun" type="checkbox" />
                    <span data-i18n="helpDryRun"></span>
                  </span>
                </label>
              </div>
            </div>
            <div class="advanced-box">
              <h3 class="section-subhead" data-i18n="advGroupMisc"></h3>
              <div class="field-grid two">
                <label class="field">
                  <span class="field-label" data-i18n="fieldSkipPatterns"></span>
                  <textarea id="skipPatterns" rows="4"></textarea>
                  <span class="field-help" data-i18n="helpSkipPatterns"></span>
                </label>
                <label class="field">
                  <span class="field-label" data-i18n="fieldPrefixes"></span>
                  <textarea id="componentPrefixes" rows="4"></textarea>
                  <span class="field-help" data-i18n="helpPrefixes"></span>
                </label>
                <label class="field">
                  <span class="field-label" data-i18n="fieldOverrides"></span>
                  <textarea id="overrides" rows="4"></textarea>
                  <span class="field-help" data-i18n="helpOverrides"></span>
                </label>
              </div>
            </div>
          </details>

          <section class="card run-card">
            <div>
              <p class="kicker" data-i18n="runKicker"></p>
              <h2 data-i18n="runTitle"></h2>
              <p class="section-copy" data-i18n="runCopy"></p>
              <p class="run-hint" id="runHint"></p>
              
              <div class="estimation-box">
                <span class="stat-label" data-i18n="estScale"></span> <strong id="estScale"></strong>
                <span class="stat-label" data-i18n="estTime" style="margin-left:14px;"></span> <strong id="estTime"></strong>
              </div>
            </div>
            <div class="run-actions">
              <button type="button" class="primary-btn" id="scanButton" data-i18n="actionScan"></button>
              <button type="button" class="primary-btn accent-btn" id="translateButton" data-i18n="actionTranslate"></button>
              <button type="button" class="secondary-btn" id="resumeButton" data-i18n="actionResume"></button>
              <button type="button" class="secondary-btn danger-btn" id="cancelButton" data-i18n="actionCancel"></button>
              <button type="button" class="secondary-btn" id="exportButton" data-i18n="actionExport"></button>
              <button type="button" class="secondary-btn" id="resetButton" data-i18n="actionReset"></button>
            </div>
          </section>
        </div>

        <aside class="sidebar">
          <section class="card live-card">
            <div class="section-head">
              <div>
                <p class="kicker" data-i18n="liveKicker"></p>
                <h2 data-i18n="liveTitle"></h2>
              </div>
              <div class="live-status">
                <span class="pulse" id="livePulse"></span>
                <span class="status-pill" id="statusPill"></span>
              </div>
            </div>

            <div class="progress-main">
              <div>
                <strong class="progress-number" id="progressNumber">0%</strong>
                <p class="progress-copy" id="monitorSummary"></p>
              </div>
              <div class="progress-shell">
                <div class="progress-bar" id="progressBar"></div>
              </div>
            </div>

            <div class="stat-grid">
              <article class="stat-card">
                <span class="stat-label" data-i18n="statPhase"></span>
                <strong id="statPhase"></strong>
              </article>
              <article class="stat-card">
                <span class="stat-label" data-i18n="statFiles"></span>
                <strong id="statFiles"></strong>
              </article>
              <article class="stat-card">
                <span class="stat-label" data-i18n="statTexts"></span>
                <strong id="statTexts"></strong>
              </article>
              <article class="stat-card">
                <span class="stat-label" data-i18n="statChanged"></span>
                <strong id="statChanged"></strong>
              </article>
              <article class="stat-card">
                <span class="stat-label" data-i18n="statCandidates"></span>
                <strong id="statCandidates"></strong>
              </article>
              <article class="stat-card">
                <span class="stat-label" data-i18n="statLastUpdate"></span>
                <strong id="statLastUpdate"></strong>
              </article>
            </div>

            <div class="live-detail">
              <div class="detail-item">
                <span class="field-label" data-i18n="currentProvider"></span>
                <code id="currentProvider"></code>
              </div>
              <div class="detail-item">
                <span class="field-label" data-i18n="currentModel"></span>
                <code id="currentModel"></code>
              </div>
              <div class="detail-item">
                <span class="field-label" data-i18n="currentActivity"></span>
                <code id="currentActivity"></code>
              </div>
              <div class="detail-item">
                <span class="field-label" data-i18n="currentFile"></span>
                <code id="currentFile"></code>
              </div>
            </div>
          </section>

          <section class="card">
            <div class="section-head">
              <div>
                <p class="kicker" data-i18n="logKicker"></p>
                <h2 data-i18n="logTitle"></h2>
              </div>
            </div>
            <div class="timeline" id="timeline"></div>
          </section>

          <section class="card">
            <div class="section-head">
              <div>
                <p class="kicker" data-i18n="resultKicker"></p>
                <h2 data-i18n="resultTitle"></h2>
              </div>
            </div>
            <pre class="result-panel" id="resultPanel"></pre>
          </section>
        </aside>
      </main>

      <footer class="card footer-card">
        <div>
          <p class="kicker" data-i18n="supportKicker"></p>
          <h2 data-i18n="supportTitle"></h2>
          <div class="support-content" data-i18n-html="supportCopy" style="font-size: 14px; line-height: 1.6; color: var(--gray-400); margin-bottom: 24px;"></div>
        </div>
        <div class="footer-meta">
          <a class="footer-link" href="mailto:mini0227kim@gmail.com">mini0227kim@gmail.com</a>
          <span class="footer-license" data-i18n="supportLicense"></span>
        </div>
      </footer>
    </div>

    <script src="/app.js" defer></script>
  </body>
</html>
